
<style>
:root{
  --g:#639922;--g-bg:#C0DD97;--g-dark:#27500A;
  --r:#A32D2D;--r-bg:#F7C1C1;--r-light:#FCEBEB;
  --am:#BA7517;--am-bg:#FAC775;--am-dark:#633806;
  --bl:#185FA5;--bl-bg:#B5D4F4;--bl-dark:#0C447C;
  --pk:#993556;--pk-bg:#F4C0D1;--pk-dark:#72243E;
  --pu:#534AB7;--pu-bg:#EEEDFE;--pu-dark:#26215C;
  --border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--muted:#666;--hint:#999;
  --surface:#fff;--bg:#f5f4f0;
  --r8:8px;--r12:12px;--r14:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* nav tabs */
.nav{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r12);padding:4px}
.nav-tab{flex:1;text-align:center;padding:8px 4px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.nav-tab.active{background:var(--text);color:var(--surface)}

/* pages */
.pg{display:none}.pg.show{display:block}

/* info card */
.info-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r14);padding:1.25rem;margin-bottom:1rem}
.ic-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.ic-title{font-size:13px;font-weight:600;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;flex:1}
.edit-btn{font-size:12px;padding:3px 10px;border-radius:6px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.edit-btn:hover{background:var(--bg)}
.info-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.info-item label{font-size:11px;color:var(--hint);font-weight:500;display:block;margin-bottom:3px}
.info-item .val{font-size:15px;font-weight:600;color:var(--text)}
.info-item input{width:100%;font-size:14px;padding:5px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit}
.info-item input:focus{outline:none;border-color:#888}
.save-row{display:flex;justify-content:flex-end;margin-top:10px;gap:8px}

/* kpi */
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.kpi{border-radius:var(--r8);padding:.85rem;text-align:center}
.kpi-g{background:var(--g-bg)}.kpi-b{background:var(--bl-bg)}.kpi-p{background:var(--pk-bg)}.kpi-a{background:var(--am-bg)}
.kpi-label{font-size:11px;font-weight:600;margin-bottom:4px}
.kpi-g .kpi-label{color:var(--g)}.kpi-b .kpi-label{color:var(--bl)}.kpi-p .kpi-label{color:var(--pk)}.kpi-a .kpi-label{color:var(--am)}
.kpi-val{font-size:28px;font-weight:600;line-height:1}
.kpi-g .kpi-val{color:var(--g-dark)}.kpi-b .kpi-val{color:var(--bl-dark)}.kpi-p .kpi-val{color:var(--pk-dark)}.kpi-a .kpi-val{color:var(--am-dark)}
.kpi-sub{font-size:10px;margin-top:3px;opacity:.7}
.kpi-g .kpi-sub{color:var(--g)}.kpi-b .kpi-sub{color:var(--bl)}.kpi-p .kpi-sub{color:var(--pk)}.kpi-a .kpi-sub{color:var(--am)}

/* chart card */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r14);padding:1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;letter-spacing:.05em;color:var(--muted);margin-bottom:12px;text-transform:uppercase}
.chart-row{display:flex;align-items:center;gap:2rem}
.chart-wrap{width:140px;height:140px;flex-shrink:0}
.legend{display:flex;flex-direction:column;gap:10px;flex:1}
.leg{display:flex;align-items:center;gap:8px;font-size:13px}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.leg-name{color:var(--muted);flex:1}.leg-val{font-weight:600}

/* table */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tabs{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.tab{cursor:pointer;padding:3px 11px;border-radius:20px;font-size:12px;border:0.5px solid var(--border);color:var(--muted);background:transparent}
.tab.active{background:var(--text);color:var(--surface);border-color:transparent}
.btn{cursor:pointer;border:0.5px solid var(--border);background:transparent;border-radius:var(--r8);padding:5px 11px;font-size:12px;color:var(--muted);white-space:nowrap}
.btn:hover{background:var(--bg);color:var(--text)}
.btn-primary{background:var(--text);color:var(--surface);border-color:transparent}
.btn-primary:hover{opacity:.85;background:var(--text);color:var(--surface)}
.btn-danger:hover{background:var(--r-light);color:var(--r);border-color:var(--r-bg)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;color:var(--hint);font-weight:500;border-bottom:0.5px solid var(--border);font-size:12px}
td{padding:8px 10px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-confirmed{background:var(--g);color:#fff}.b-declined{background:var(--r);color:#fff}.b-pending{background:var(--am);color:#fff}
.act-btn{cursor:pointer;border:none;background:transparent;font-size:12px;padding:3px 7px;border-radius:5px;color:var(--muted)}
.act-btn:hover{background:var(--bg);color:var(--text)}
.act-btn.del:hover{color:var(--r)}
.empty{text-align:center;padding:2rem;color:var(--hint);font-size:13px}

/* form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-full{grid-column:1/-1}
.field label{font-size:12px;color:var(--muted);display:block;margin-bottom:3px;font-weight:500}
input[type=text],input[type=number],input[type=date],select{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border);border-radius:var(--r8);background:var(--surface);color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus{border-color:#888}
.add-btn{margin-top:10px;width:100%;padding:9px;border:0.5px solid var(--border);background:transparent;border-radius:var(--r8);font-size:14px;cursor:pointer;color:var(--text);font-family:inherit}
.add-btn:hover{background:var(--bg)}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r14);padding:1.5rem;width:min(440px,93vw);border:0.5px solid var(--border)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

/* room page */
.room-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.room-kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r12);padding:1rem;text-align:center}
.room-kpi-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;letter-spacing:.04em}
.room-kpi-val{font-size:30px;font-weight:600;color:var(--text)}
.room-kpi-sub{font-size:10px;color:var(--hint);margin-top:3px}
.room-type-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.rt-double{background:var(--bl-bg);color:var(--bl-dark)}
.rt-single{background:var(--pu-bg);color:var(--pu-dark)}
.rt-family{background:var(--g-bg);color:var(--g-dark)}
.room-adj{display:flex;align-items:center;gap:8px}
.adj-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.adj-btn:hover{background:var(--bg)}
.adj-val{font-size:14px;font-weight:600;min-width:20px;text-align:center}
.room-tag{display:inline-block;font-size:11px;padding:1px 6px;border-radius:4px;margin:1px;background:var(--am-bg);color:var(--am-dark)}
.combo-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r12);padding:1rem 1.25rem;margin-bottom:.75rem}
.combo-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.combo-name{font-size:14px;font-weight:600;flex:1}
.combo-total{font-size:12px;color:var(--muted)}
.combo-rooms{display:flex;gap:8px;flex-wrap:wrap}
.combo-room{background:var(--bg);border-radius:6px;padding:5px 10px;font-size:12px;display:flex;align-items:center;gap:5px}
.dot-double{width:8px;height:8px;border-radius:50%;background:var(--bl);flex-shrink:0}
.dot-single{width:8px;height:8px;border-radius:50%;background:var(--pu);flex-shrink:0}
.dot-family{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0}
.note-input{font-size:12px;padding:4px 8px;border:0.5px dashed var(--border);border-radius:6px;background:transparent;color:var(--muted);width:100%;margin-top:8px;font-family:inherit}
.note-input:focus{outline:none;border-color:#888;border-style:solid}

/* toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(1rem);background:var(--text);color:var(--surface);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:580px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}.form-full{grid-column:1}
  .chart-row{flex-direction:column;align-items:flex-start}
  .info-grid{grid-template-columns:1fr 1fr}
  .room-summary{grid-template-columns:repeat(2,1fr)}
}
</style>

<div class="page">

<!-- NAV -->
<div class="nav">
  <div class="nav-tab active" onclick="switchPage('overview',this)">總覽</div>
  <div class="nav-tab" onclick="switchPage('people',this)">名單</div>
  <div class="nav-tab" onclick="switchPage('rooms',this)">房間分配</div>
</div>

<!-- ══ PAGE: OVERVIEW ══ -->
<div class="pg show" id="pg-overview">

  <!-- 活動資訊 -->
  <div class="info-card">
    <div class="ic-header">
      <span class="ic-title">活動資訊</span>
      <button class="edit-btn" id="info-edit-btn" onclick="toggleInfoEdit()">編輯</button>
    </div>

      <div class="info-item"><label>結束日期</label><div class="val" id="v-end">2026/09/20</div></div>
      <div class="info-item"><label>住宿地點</label><div class="val" id="v-place">尚未決定</div></div>
    </div>

        <div class="info-item"><label>出發日期</label><input type="date" id="e-start"></div>

  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi kpi-g"><div class="kpi-label">確認人數</div><div class="kpi-val" id="k-total">0</div><div class="kpi-sub">已確認參加</div></div>
    <div class="kpi kpi-b"><div class="kpi-label">大人</div><div class="kpi-val" id="k-adults">0</div><div class="kpi-sub">已確認</div></div>
    <div class="kpi kpi-p"><div class="kpi-label">小孩</div><div class="kpi-val" id="k-children">0</div><div class="kpi-sub">已確認</div></div>
    <div class="kpi kpi-a"><div class="kpi-label">考慮中人數</div><div class="kpi-val" id="k-potential">0</div><div class="kpi-sub">尚未確定</div></div>
  </div>

  <!-- Chart -->
  <div class="card">
    <div class="card-title">狀態分佈</div>
    <div class="chart-row">
      <div class="chart-wrap"><canvas id="pie" width="140" height="140"></canvas></div>

        <div class="leg"><div class="leg-dot" style="background:#639922"></div><span class="leg-name">會參加</span><span class="leg-val" id="l-confirmed">0 組</span></div>
        <div class="leg"><div class="leg-dot" style="background:#A32D2D"></div><span class="leg-name">不參加</span><span class="leg-val" id="l-declined">0 組</span></div>
        <div class="leg"><div class="leg-dot" style="background:#BA7517"></div><span class="leg-name">考慮中</span><span class="leg-val" id="l-pending">0 組</span></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: PEOPLE ══ -->
<div class="pg" id="pg-people">
  <div class="card">
    <div class="toolbar">
      <div class="tabs">
        <div class="tab active" onclick="setFilter('all',this)">全部</div>

    </div>

  </div>
</div>

<!-- ══ PAGE: ROOMS ══ -->
<div class="pg" id="pg-rooms">
  <!-- 房型調整 -->
  <div class="card">
    <div class="card-title">房型設定</div>
    <table>
      <thead><tr><th>房型</th><th>說明</th><th>容納</th><th>數量調整</th></tr></thead>

  <!-- 房間總覽 KPI -->
  <div class="room-summary">

    <div class="room-kpi"><div class="room-kpi-label">總人數</div><div class="room-kpi-val" id="rk-people">0</div><div class="room-kpi-sub">人（已確認）</div></div>
    <div class="room-kpi"><div class="room-kpi-label">剩餘床位</div><div class="room-kpi-val" id="rk-spare">0</div><div class="room-kpi-sub">個空位</div></div>
  </div>

  <!-- 分配清單 -->

  <!-- 民宿搜尋提示 -->

</div><!-- /page -->

<!-- Edit Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">編輯家庭資料</div>
    <div class="form-grid">
      <div class="field"><label>姓名 *</label><input type="text" id="e-name"></div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const LS = 'gtrip_v3';
let data = [], filter = 'all', editId = null, pieChart = null;
let tripInfo = { start:'2026-09-19', end:'2026-09-20', place:'尚未決定' };
let roomCounts = { double:0, single:0, family:0 };
let roomNotes = {};

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(LS)||'{}');
    data = s.data||[];
    if(s.tripInfo) tripInfo = s.tripInfo;
    if(s.roomCounts) roomCounts = s.roomCounts;
    if(s.roomNotes) roomNotes = s.roomNotes;
  } catch { data=[]; }
}
function save() {
  localStorage.setItem(LS, JSON.stringify({data, tripInfo, roomCounts, roomNotes}));
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ── NAV ──
function switchPage(pg, el) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg-'+pg).classList.add('show');
  el.classList.add('active');
  if(pg==='rooms') renderRooms();
}

// ── INFO ──
function renderInfo() {
  const fmt = d => d ? d.replace(/-/g,'/') : '—';
  document.getElementById('v-start').textContent = fmt(tripInfo.start);
  document.getElementById('v-end').textContent   = fmt(tripInfo.end);
  document.getElementById('v-place').textContent = tripInfo.place||'尚未決定';
}
function toggleInfoEdit() {
  const editing = document.getElementById('info-edit').style.display!=='none';
  if(editing) { cancelInfoEdit(); return; }
  document.getElementById('e-start').value = tripInfo.start||'';
  document.getElementById('e-end').value   = tripInfo.end||'';
  document.getElementById('e-place').value = tripInfo.place||'';
  document.getElementById('info-view').style.display='none';
  document.getElementById('info-edit').style.display='block';
  document.getElementById('info-edit-btn').textContent='取消';
}
function cancelInfoEdit() {
  document.getElementById('info-view').style.display='';
  document.getElementById('info-edit').style.display='none';
  document.getElementById('info-edit-btn').textContent='編輯';
}
function saveInfo() {
  tripInfo.start = document.getElementById('e-start').value;
  tripInfo.end   = document.getElementById('e-end').value;
  tripInfo.place = document.getElementById('e-place').value.trim()||'尚未決定';
  save(); renderInfo(); cancelInfoEdit(); toast('活動資訊已儲存');
}

// ── KPI + CHART ──
function renderOverview() {
  const confirmed = data.filter(d=>d.status==='confirmed');
  const declined  = data.filter(d=>d.status==='declined');
  const pending   = data.filter(d=>d.status==='pending');
  const tA = confirmed.reduce((a,d)=>a+(+d.adults||0),0);
  const tC = confirmed.reduce((a,d)=>a+(+d.children||0),0);
  const pP = pending.reduce((a,d)=>a+(+d.adults||0)+(+d.children||0),0);
  document.getElementById('k-total').textContent    = tA+tC;
  document.getElementById('k-adults').textContent   = tA;
  document.getElementById('k-children').textContent = tC;
  document.getElementById('k-potential').textContent= pP;
  document.getElementById('l-confirmed').textContent= confirmed.length+' 組';
  document.getElementById('l-declined').textContent = declined.length+' 組';
  document.getElementById('l-pending').textContent  = pending.length+' 組';
  renderPie(confirmed.length, declined.length, pending.length);
}
function renderPie(c,d,p) {
  const ctx = document.getElementById('pie').getContext('2d');
  if(pieChart) pieChart.destroy();
  if(c+d+p===0){
    ctx.clearRect(0,0,140,140);ctx.fillStyle='#ddd';
    ctx.beginPath();ctx.arc(70,70,60,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(70,70,38,0,Math.PI*2);ctx.fill();
    return;
  }
  pieChart = new Chart(ctx,{type:'doughnut',data:{labels:['會參加','不參加','考慮中'],datasets:[{data:[c,d,p],backgroundColor:['#639922','#A32D2D','#BA7517'],borderWidth:3,borderColor:'#fff',hoverOffset:5}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>' '+i.label+': '+i.raw+' 組'}}},cutout:'58%',animation:{duration:300}}});
}

// ── TABLE ──
function renderTable() {
  const tbody=document.getElementById('tbody'),empty=document.getElementById('empty');
  const rows=filter==='all'?data:data.filter(d=>d.status===filter);
  if(!rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=rows.map(d=>`<tr>
    <td style="font-weight:600">${esc(d.name)}</td>
    <td><span class="badge b-${d.status}">${sLabel(d.status)}</span></td>
    <td>${d.adults}</td><td>${d.children}</td>
    <td style="color:var(--muted);font-size:12px">${esc(d.note||'')}</td>
    <td style="white-space:nowrap">
      <button class="act-btn" onclick="openEdit('${d.id}')">編輯</button>
      <button class="act-btn del" onclick="delEntry('${d.id}')">刪除</button>
    </td></tr>`).join('');
}
function sLabel(s){return s==='confirmed'?'會參加':s==='declined'?'不參加':'考慮中';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── CRUD ──
function addEntry(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('請輸入姓名');return;}
  data.push({id:uid(),name,status:document.getElementById('f-status').value,adults:Math.max(0,parseInt(document.getElementById('f-adults').value)||0),children:Math.max(0,parseInt(document.getElementById('f-children').value)||0),note:document.getElementById('f-note').value.trim()});
  save();renderAll();toast('已新增 '+name);
  ['f-name','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-adults').value='2';
  document.getElementById('f-children').value='0';
  document.getElementById('f-status').value='confirmed';
}
function delEntry(id){
  const d=data.find(x=>x.id===id);
  if(!confirm('確定刪除「'+(d?d.name:'')+'」？'))return;
  data=data.filter(x=>x.id!==id);save();renderAll();toast('已刪除');
}
function openEdit(id){
  const d=data.find(x=>x.id===id);if(!d)return;
  editId=id;
  document.getElementById('e-name').value=d.name;
  document.getElementById('e-status').value=d.status;
  document.getElementById('e-adults').value=d.adults;
  document.getElementById('e-children').value=d.children;
  document.getElementById('e-note').value=d.note||'';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editId=null;}
function saveEdit(){
  const name=document.getElementById('e-name').value.trim();
  if(!name){alert('請輸入姓名');return;}
  const i=data.findIndex(d=>d.id===editId);if(i<0)return;
  data[i]={...data[i],name,status:document.getElementById('e-status').value,adults:Math.max(0,parseInt(document.getElementById('e-adults').value)||0),children:Math.max(0,parseInt(document.getElementById('e-children').value)||0),note:document.getElementById('e-note').value.trim()};
  save();renderAll();closeModal();toast('已儲存');
}
function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderTable();
}
function confirmReset(){if(!confirm('確定清空所有名單？'))return;data=[];save();renderAll();toast('已清空');}

// ── ROOMS ──
function autoCalcRooms(){
  const confirmed=data.filter(d=>d.status==='confirmed');
  let double=0,single=0,family=0;
  confirmed.forEach(d=>{
    const a=+d.adults||0,c=+d.children||0;
    if(c>0) family++;
    else if(a>=2) double++;
    else single++;
  });
  roomCounts={double,single,family};
  document.getElementById('ra-double').textContent=double;
  document.getElementById('ra-single').textContent=single;
  document.getElementById('ra-family').textContent=family;
  save();renderRooms();toast('已自動計算房間');
}
function adjRoom(type,delta){
  roomCounts[type]=Math.max(0,(roomCounts[type]||0)+delta);
  document.getElementById('ra-'+type).textContent=roomCounts[type];
  save();
}
function renderRooms(){
  // sync display
  document.getElementById('ra-double').textContent=roomCounts.double;
  document.getElementById('ra-single').textContent=roomCounts.single;
  document.getElementById('ra-family').textContent=roomCounts.family;

  const total=roomCounts.double+roomCounts.single+roomCounts.family;
  const cap=roomCounts.double*2+roomCounts.single*1+roomCounts.family*4;
  const confirmed=data.filter(d=>d.status==='confirmed');
  const people=confirmed.reduce((a,d)=>a+(+d.adults||0)+(+d.children||0),0);
  const spare=cap-people;

  document.getElementById('rk-total').textContent=total;
  document.getElementById('rk-people').textContent=people;
  document.getElementById('rk-spare').textContent=Math.max(0,spare)+(spare<0?' ⚠️不足':'');

  // build family → room type mapping
  const families=confirmed.map(d=>({...d,roomType: (+d.children||0)>0?'family': (+d.adults||0)>=2?'double':'single'}));

  // render room cards
  const list=document.getElementById('room-list');
  if(!families.length){list.innerHTML='<div class="empty">名單中還沒有已確認的家庭</div>';document.getElementById('hostel-hint').style.display='none';return;}

  let html='';
  // group by room type
  const groups=[{type:'family',label:'家庭房',dot:'dot-family'},{type:'double',label:'雙人房',dot:'dot-double'},{type:'single',label:'單人房',dot:'dot-single'}];
  groups.forEach(g=>{
    const fams=families.filter(f=>f.roomType===g.type);
    if(!fams.length)return;
    fams.forEach((f,i)=>{
      const key=g.type+'_'+i;
      const note=roomNotes[key]||'';
      html+=`<div class="combo-card">
        <div class="combo-header">
          <span class="room-type-badge rt-${g.type}">${g.label}</span>
          <span class="combo-name">${esc(f.name)}</span>
          <span class="combo-total">${(+f.adults||0)+(+f.children||0)} 人 · 大人${f.adults} 小孩${f.children}</span>
        </div>
        <div class="combo-rooms">
          <div class="combo-room"><div class="${g.dot}"></div>${g.label} ×1</div>
          ${f.note?`<div class="combo-room" style="background:var(--am-bg);color:var(--am-dark)">${esc(f.note)}</div>`:''}
        </div>
        <input class="note-input" placeholder="備註這間房（例：需要加床、一樓優先）" value="${esc(note)}" oninput="saveRoomNote('${key}',this.value)">
      </div>`;
    });
  });
  list.innerHTML=html;

  // hostel hint
  const hint=document.getElementById('hostel-hint');
  const kw=document.getElementById('hostel-keywords');
  hint.style.display='block';
  const tags=[
    `<span class="room-tag">共${total}間</span>`,
    roomCounts.family?`<span class="room-tag">家庭房×${roomCounts.family}</span>`:'',
    roomCounts.double?`<span class="room-tag">雙人房×${roomCounts.double}</span>`:'',
    roomCounts.single?`<span class="room-tag">單人房×${roomCounts.single}</span>`:'',
    `<span class="room-tag">可容納${cap}人</span>`,
    `<span class="room-tag">包棟</span>`,
    tripInfo.place&&tripInfo.place!=='尚未決定'?`<span class="room-tag">${tripInfo.place}</span>`:'',
    `<span class="room-tag">2026/09/19-20</span>`,
  ].filter(Boolean).join(' ');
  kw.innerHTML=tags+'<div style="margin-top:10px;font-size:12px;color:var(--muted)">複製上方關鍵字，貼到民宿平台或 Google 搜尋</div>';
}
function saveRoomNote(key,val){roomNotes[key]=val;save();}

// ── EXPORT ──
function exportCSV(){
  const h=['姓名','狀態','大人','小孩','備註'];
  const rows=data.map(d=>[d.name,sLabel(d.status),d.adults,d.children,d.note||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+[h.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='包棟名單.csv';a.click();
  toast('已匯出 CSV');
}

// ── TOAST ──
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

// ── RENDER ALL ──
function renderAll(){renderOverview();renderTable();}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('f-name').addEventListener('keydown',e=>{if(e.key==='Enter')addEntry();});

load();renderInfo();renderAll();
// sync room count display on load
document.getElementById('ra-double').textContent=roomCounts.double;
document.getElementById('ra-single').textContent=roomCounts.single;
document.getElementById('ra-family').textContent=roomCounts.family;
</script>
