<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>親子包棟人數管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --green: #639922; --green-bg: #C0DD97; --green-dark: #27500A;
    --red: #A32D2D; --red-bg: #F7C1C1; --red-light: #FCEBEB;
    --amber: #BA7517; --amber-bg: #FAC775; --amber-dark: #633806;
    --blue-bg: #B5D4F4; --blue: #185FA5; --blue-dark: #0C447C;
    --pink-bg: #F4C0D1; --pink: #993556; --pink-dark: #72243E;
    --border: rgba(0,0,0,0.12);
    --text: #1a1a1a; --text-muted: #666; --text-hint: #999;
    --surface: #fff; --bg: #f5f4f0;
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --border: rgba(255,255,255,0.12);
      --text: #f0f0f0; --text-muted: #aaa; --text-hint: #666;
      --surface: #1e1e1e; --bg: #141414;
      --green-bg: #1a2e0a; --green: #97C459; --green-dark: #C0DD97;
      --red-bg: #2e0f0f; --red: #E24B4A;
      --amber-bg: #2e1e05; --amber: #EF9F27; --amber-dark: #FAC775;
      --blue-bg: #0c1e33; --blue: #85B7EB; --blue-dark: #B5D4F4;
      --pink-bg: #2e1020; --pink: #ED93B1; --pink-dark: #F4C0D1;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .page { max-width: 860px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  h1 { font-size: 20px; font-weight: 600; flex: 1; }
  .source-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .source-csv   { background: var(--blue-bg); color: var(--blue-dark); }
  .source-local { background: var(--amber-bg); color: var(--amber-dark); }
  .reload-btn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 0.5px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; }
  .reload-btn:hover { background: var(--bg); }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .kpi { border-radius: var(--radius); padding: 1rem; text-align: center; }
  .kpi-confirmed { background: var(--green-bg); }
  .kpi-adults    { background: var(--blue-bg); }
  .kpi-children  { background: var(--pink-bg); }
  .kpi-pending   { background: var(--amber-bg); }
  .kpi-label { font-size: 11px; font-weight: 600; letter-spacing: .04em; margin-bottom: 6px; }
  .kpi-confirmed .kpi-label { color: var(--green); }
  .kpi-adults    .kpi-label { color: var(--blue); }
  .kpi-children  .kpi-label { color: var(--pink); }
  .kpi-pending   .kpi-label { color: var(--amber); }
  .kpi-val { font-size: 34px; font-weight: 600; line-height: 1; }
  .kpi-confirmed .kpi-val { color: var(--green-dark); }
  .kpi-adults    .kpi-val { color: var(--blue-dark); }
  .kpi-children  .kpi-val { color: var(--pink-dark); }
  .kpi-pending   .kpi-val { color: var(--amber-dark); }
  .kpi-sub { font-size: 10px; margin-top: 5px; opacity: .7; }
  .kpi-confirmed .kpi-sub { color: var(--green); }
  .kpi-adults    .kpi-sub { color: var(--blue); }
  .kpi-children  .kpi-sub { color: var(--pink); }
  .kpi-pending   .kpi-sub { color: var(--amber); }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 12px; font-weight: 600; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; }
  .chart-row { display: flex; align-items: center; gap: 2rem; }
  .chart-wrap { width: 150px; height: 150px; flex-shrink: 0; }
  .legend { display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .leg { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .leg-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
  .leg-name { color: var(--text-muted); flex: 1; }
  .leg-val { font-weight: 600; }

  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .tabs { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .tab { cursor: pointer; padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 0.5px solid var(--border); color: var(--text-muted); background: transparent; }
  .tab.active { background: var(--text); color: var(--surface); border-color: transparent; }
  .btn { cursor: pointer; border: 0.5px solid var(--border); background: transparent; border-radius: 8px; padding: 5px 11px; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .btn:hover { background: var(--bg); color: var(--text); }
  .btn-danger:hover { background: var(--red-light); color: var(--red); border-color: var(--red-bg); }
  .btn-primary { background: var(--text); color: var(--surface); border-color: transparent; }
  .btn-primary:hover { opacity: .85; background: var(--text); color: var(--surface); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 7px 10px; color: var(--text-hint); font-weight: 500; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  td { padding: 9px 10px; border-bottom: 0.5px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .b-confirmed { background: var(--green); color: #fff; }
  .b-declined  { background: var(--red);   color: #fff; }
  .b-pending   { background: var(--amber); color: #fff; }
  .empty { text-align: center; padding: 2.5rem; color: var(--text-hint); font-size: 13px; }
  .act-btn { cursor: pointer; border: none; background: transparent; font-size: 12px; padding: 3px 8px; border-radius: 6px; color: var(--text-muted); }
  .act-btn:hover { background: var(--bg); color: var(--text); }
  .act-btn.del:hover { color: var(--red); }

  /* readonly notice */
  .csv-notice { font-size: 12px; color: var(--blue); background: var(--blue-bg); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: none; }
  .csv-notice.show { display: block; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-full { grid-column: 1 / -1; }
  .field label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 500; }
  input[type=text], input[type=number], select {
    width: 100%; font-size: 13px; padding: 7px 10px;
    border: 0.5px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text);
    outline: none; font-family: inherit;
  }
  input:focus, select:focus { border-color: #888; }
  .add-btn { margin-top: 12px; width: 100%; padding: 9px; border: 0.5px solid var(--border); background: transparent; border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--text); font-family: inherit; }
  .add-btn:hover { background: var(--bg); }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; width: min(420px, 92vw); border: 0.5px solid var(--border); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 1.25rem; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(1rem); background: var(--text); color: var(--surface); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .25s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
    .chart-row { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>親子包棟人數管理</h1>
    <span class="source-badge source-local" id="source-badge">本機資料</span>
    <button class="reload-btn" onclick="reloadCSV()" title="重新從 data.csv 載入">↺ 重新載入</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi kpi-confirmed"><div class="kpi-label">確認人數</div><div class="kpi-val" id="k-total">0</div><div class="kpi-sub">已確認參加</div></div>
    <div class="kpi kpi-adults">   <div class="kpi-label">大人</div>  <div class="kpi-val" id="k-adults">0</div><div class="kpi-sub">已確認</div></div>
    <div class="kpi kpi-children"> <div class="kpi-label">小孩</div>  <div class="kpi-val" id="k-children">0</div><div class="kpi-sub">已確認</div></div>
    <div class="kpi kpi-pending">  <div class="kpi-label">考慮中人數</div><div class="kpi-val" id="k-potential">0</div><div class="kpi-sub">尚未確定</div></div>
  </div>

  <div class="card">
    <div class="card-title">狀態分佈</div>
    <div class="chart-row">
      <div class="chart-wrap"><canvas id="pie" width="150" height="150"></canvas></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#639922"></div><span class="leg-name">會參加</span><span class="leg-val" id="l-confirmed">0 組</span></div>
        <div class="leg"><div class="leg-dot" style="background:#A32D2D"></div><span class="leg-name">不參加</span><span class="leg-val" id="l-declined">0 組</span></div>
        <div class="leg"><div class="leg-dot" style="background:#BA7517"></div><span class="leg-name">考慮中</span><span class="leg-val" id="l-pending">0 組</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="csv-notice" id="csv-notice">
      ✦ 目前顯示 data.csv 的資料。若要新增／編輯，請直接修改 repo 裡的 data.csv，然後按「↺ 重新載入」。
    </div>
    <div class="toolbar">
      <div class="tabs">
        <div class="tab active" onclick="setFilter('all',this)">全部</div>
        <div class="tab" onclick="setFilter('confirmed',this)">會參加</div>
        <div class="tab" onclick="setFilter('pending',this)">考慮中</div>
        <div class="tab" onclick="setFilter('declined',this)">不參加</div>
      </div>
      <button class="btn" onclick="exportCSV()">匯出 CSV</button>
      <button class="btn btn-danger" id="reset-btn" onclick="confirmReset()">清空</button>
    </div>
    <table>
      <thead><tr><th>姓名</th><th>狀態</th><th>大人</th><th>小孩</th><th>備註</th><th></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">還沒有資料 👇</div>
  </div>

  <div class="card" id="add-card">
    <div class="card-title">新增家庭</div>
    <div class="form-grid">
      <div class="field"><label>姓名 *</label><input type="text" id="f-name" placeholder="王小明"></div>
      <div class="field"><label>狀態</label>
        <select id="f-status">
          <option value="confirmed">會參加</option>
          <option value="pending">考慮中</option>
          <option value="declined">不參加</option>
        </select>
      </div>
      <div class="field"><label>大人人數</label><input type="number" id="f-adults" min="0" value="2"></div>
      <div class="field"><label>小孩人數</label><input type="number" id="f-children" min="0" value="0"></div>
      <div class="field form-full"><label>備註</label><input type="text" id="f-note" placeholder="選填"></div>
    </div>
    <button class="add-btn" onclick="addEntry()">+ 新增</button>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">編輯家庭資料</div>
    <div class="form-grid">
      <div class="field"><label>姓名 *</label><input type="text" id="e-name"></div>
      <div class="field"><label>狀態</label>
        <select id="e-status">
          <option value="confirmed">會參加</option>
          <option value="pending">考慮中</option>
          <option value="declined">不參加</option>
        </select>
      </div>
      <div class="field"><label>大人</label><input type="number" id="e-adults" min="0"></div>
      <div class="field"><label>小孩</label><input type="number" id="e-children" min="0"></div>
      <div class="field form-full"><label>備註</label><input type="text" id="e-note"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS_KEY = 'group_trip_data';
let data = [], filter = 'all', editId = null, chart = null;
let fromCSV = false; // 是否成功從 data.csv 載入

// ── 資料來源判斷 ──────────────────────────────────────────
// GitHub Pages 是 https，本機 file:// 時 fetch 會失敗
async function init() {
  try {
    const res = await fetch('data.csv', { cache: 'no-store' });
    if (!res.ok) throw new Error('not found');
    const text = await res.text();
    data = parseCSVText(text);
    fromCSV = true;
    setCSVMode(true);
  } catch {
    // 本機或 data.csv 不存在 → 用 localStorage
    try { data = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { data = []; }
    fromCSV = false;
    setCSVMode(false);
  }
  render();
}

function setCSVMode(isCSV) {
  const badge  = document.getElementById('source-badge');
  const notice = document.getElementById('csv-notice');
  const addCard = document.getElementById('add-card');
  const resetBtn = document.getElementById('reset-btn');
  if (isCSV) {
    badge.textContent = 'data.csv';
    badge.className = 'source-badge source-csv';
    notice.classList.add('show');
    // CSV 模式隱藏新增表單和清空（資料以 csv 為主）
    addCard.style.display = 'none';
    resetBtn.style.display = 'none';
  } else {
    badge.textContent = '本機資料';
    badge.className = 'source-badge source-local';
    notice.classList.remove('show');
    addCard.style.display = 'block';
    resetBtn.style.display = '';
  }
}

async function reloadCSV() {
  toast('重新載入中...');
  await init();
  toast('已重新載入');
}

// ── CSV 解析 ────────────────────────────────────────────
function parseCSVText(text) {
  const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const header = parseRow(lines[0]).map(h => h.trim());
  const nameIdx     = header.indexOf('姓名');
  const statusIdx   = header.indexOf('狀態');
  const adultsIdx   = header.indexOf('大人');
  const childrenIdx = header.indexOf('小孩');
  const noteIdx     = header.indexOf('備註');
  if (nameIdx === -1) return [];

  return lines.slice(1).map(line => {
    const f = parseRow(line);
    const name = (f[nameIdx] || '').trim();
    if (!name) return null;
    return {
      id: uid(),
      name,
      status: toStatus(statusIdx >= 0 ? f[statusIdx] : ''),
      adults: Math.max(0, parseInt(f[adultsIdx] || '0') || 0),
      children: Math.max(0, parseInt(f[childrenIdx] || '0') || 0),
      note: noteIdx >= 0 ? (f[noteIdx] || '').trim() : ''
    };
  }).filter(Boolean);
}

function parseRow(line) {
  const fields = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { fields.push(cur); cur = ''; continue; }
    cur += ch;
  }
  fields.push(cur);
  return fields.map(f => f.trim());
}

function toStatus(s) {
  if (!s) return 'confirmed';
  if (s.includes('不參加') || s === 'declined') return 'declined';
  if (s.includes('考慮')   || s === 'pending')  return 'pending';
  return 'confirmed';
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── localStorage (本機模式) ─────────────────────────────
function save() { if (!fromCSV) localStorage.setItem(LS_KEY, JSON.stringify(data)); }

// ── Render ───────────────────────────────────────────────
function render() {
  const confirmed = data.filter(d => d.status === 'confirmed');
  const declined  = data.filter(d => d.status === 'declined');
  const pending   = data.filter(d => d.status === 'pending');
  const totalA    = confirmed.reduce((a, d) => a + (+d.adults   || 0), 0);
  const totalC    = confirmed.reduce((a, d) => a + (+d.children || 0), 0);
  const pendingP  = pending.reduce((a, d) => a + (+d.adults || 0) + (+d.children || 0), 0);
  document.getElementById('k-total').textContent     = totalA + totalC;
  document.getElementById('k-adults').textContent    = totalA;
  document.getElementById('k-children').textContent  = totalC;
  document.getElementById('k-potential').textContent = pendingP;
  document.getElementById('l-confirmed').textContent = confirmed.length + ' 組';
  document.getElementById('l-declined').textContent  = declined.length  + ' 組';
  document.getElementById('l-pending').textContent   = pending.length   + ' 組';
  renderChart(confirmed.length, declined.length, pending.length);
  renderTable();
}

function renderChart(c, d, p) {
  const ctx = document.getElementById('pie').getContext('2d');
  if (chart) chart.destroy();
  if (c + d + p === 0) {
    ctx.clearRect(0, 0, 150, 150);
    ctx.fillStyle = '#ddd';
    ctx.beginPath(); ctx.arc(75, 75, 65, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(75, 75, 42, 0, Math.PI * 2); ctx.fill();
    return;
  }
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: ['會參加','不參加','考慮中'], datasets: [{ data: [c,d,p], backgroundColor: ['#639922','#A32D2D','#BA7517'], borderWidth: 3, borderColor: '#fff', hoverOffset: 6 }] },
    options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: i => ' ' + i.label + ': ' + i.raw + ' 組' } } }, cutout: '58%', animation: { duration: 350 } }
  });
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const rows = filter === 'all' ? data : data.filter(d => d.status === filter);
  if (rows.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  // CSV 模式不顯示編輯/刪除按鈕
  const actions = fromCSV ? '' : `
    <button class="act-btn" onclick="openEdit('__ID__')">編輯</button>
    <button class="act-btn del" onclick="deleteEntry('__ID__')">刪除</button>`;
  tbody.innerHTML = rows.map(d => `
    <tr>
      <td style="font-weight:600">${esc(d.name)}</td>
      <td><span class="badge b-${d.status}">${statusLabel(d.status)}</span></td>
      <td>${d.adults}</td><td>${d.children}</td>
      <td style="color:var(--text-muted);font-size:12px">${esc(d.note||'')}</td>
      <td style="white-space:nowrap">${actions.replaceAll('__ID__', d.id)}</td>
    </tr>`).join('');
}

function statusLabel(s) { return s === 'confirmed' ? '會參加' : s === 'declined' ? '不參加' : '考慮中'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── CRUD（本機模式） ─────────────────────────────────────
function addEntry() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('請輸入姓名'); return; }
  data.push({ id: uid(), name, status: document.getElementById('f-status').value, adults: Math.max(0, parseInt(document.getElementById('f-adults').value)||0), children: Math.max(0, parseInt(document.getElementById('f-children').value)||0), note: document.getElementById('f-note').value.trim() });
  save(); render(); toast('已新增 ' + name);
  ['f-name','f-note'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-adults').value='2';
  document.getElementById('f-children').value='0';
  document.getElementById('f-status').value='confirmed';
}

function deleteEntry(id) {
  const d = data.find(x => x.id===id);
  if (!confirm('確定刪除「'+(d?d.name:'')+'」？')) return;
  data = data.filter(x => x.id!==id); save(); render(); toast('已刪除');
}

function openEdit(id) {
  const d = data.find(x => x.id===id); if (!d) return;
  editId = id;
  document.getElementById('e-name').value = d.name;
  document.getElementById('e-status').value = d.status;
  document.getElementById('e-adults').value = d.adults;
  document.getElementById('e-children').value = d.children;
  document.getElementById('e-note').value = d.note||'';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editId=null; }
function saveEdit() {
  const name = document.getElementById('e-name').value.trim();
  if (!name) { alert('請輸入姓名'); return; }
  const i = data.findIndex(d => d.id===editId); if(i<0) return;
  data[i] = { ...data[i], name, status: document.getElementById('e-status').value, adults: Math.max(0,parseInt(document.getElementById('e-adults').value)||0), children: Math.max(0,parseInt(document.getElementById('e-children').value)||0), note: document.getElementById('e-note').value.trim() };
  save(); render(); closeModal(); toast('已儲存');
}

// ── Filter ────────────────────────────────────────────────
function setFilter(f, el) {
  filter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); renderTable();
}

// ── Export CSV ────────────────────────────────────────────
function exportCSV() {
  const headers = ['姓名','狀態','大人','小孩','備註'];
  const rows = data.map(d => [d.name, statusLabel(d.status), d.adults, d.children, d.note||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv = '\uFEFF' + [headers.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = '包棟名單.csv'; a.click();
  toast('已匯出 CSV');
}

// ── Reset（本機模式）─────────────────────────────────────
function confirmReset() {
  if(!confirm('確定清空所有資料？此動作無法復原。')) return;
  data=[]; save(); render(); toast('已清空');
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });
document.getElementById('f-name').addEventListener('keydown', e=>{ if(e.key==='Enter') addEntry(); });

init();
</script>
</body>
